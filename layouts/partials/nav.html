    <script>
      // Render industries in nav with custom order
      if (typeof practicesData !== 'undefined') {
        const industriesMenu = document.getElementById('industries-menu');
        const navOrder = ["Individuals and Local Business", "Startups and Online Business", "Real Estate Owners", "International U.S. Citizens", "Foreign Business and Investors", "U.S. Expats Abroad"];
        navOrder.forEach(name => {
          const practice = Object.values(practicesData).find(p => p.name === name);
          if (practice) {
            const link = document.createElement('a');
            link.href = practice.href;
            link.textContent = practice.name;
            industriesMenu.appendChild(link);
          }
        });
      }

      // Add dropdown hover logic with delay
      (function() {
        let dropdownTimeout;
        const navLinks = document.querySelector('.nav-links');
        if (!navLinks) return;
        const mainDropdowns = navLinks.querySelectorAll(':scope > li.nav-dropdown');
        mainDropdowns.forEach(dropdown => {
          const menu = dropdown.querySelector('.nav-dropdown-menu');
          if (!menu) return;

          dropdown.addEventListener('mouseenter', () => {
            clearTimeout(dropdownTimeout);
            mainDropdowns.forEach(other => {
              if (other !== dropdown) {
                const otherMenu = other.querySelector('.nav-dropdown-menu');
                if (otherMenu) {
                  otherMenu.style.opacity = '0';
                  otherMenu.style.visibility = 'hidden';
                  otherMenu.style.pointerEvents = 'none';
                }
              }
            });
            menu.style.opacity = '1';
            menu.style.visibility = 'visible';
            menu.style.pointerEvents = 'auto';
          });

          dropdown.addEventListener('mouseleave', () => {
            dropdownTimeout = setTimeout(() => {
              menu.style.opacity = '0';
              menu.style.visibility = 'hidden';
              menu.style.pointerEvents = 'none';
            }, 300);
          });

          menu.addEventListener('mouseenter', () => {
            clearTimeout(dropdownTimeout);
            menu.style.opacity = '1';
            menu.style.visibility = 'visible';
            menu.style.pointerEvents = 'auto';
          });

          menu.addEventListener('mouseleave', () => {
            dropdownTimeout = setTimeout(() => {
              menu.style.opacity = '0';
              menu.style.visibility = 'hidden';
              menu.style.pointerEvents = 'none';
            }, 300);
          });
        });
      })();
    </script>

<!-- Nav scripts -->
<script>
  // Nav scroll shadow with throttling
  (function () {
    var nav = document.getElementById('nav');
    var ticking = false;
    window.addEventListener('scroll', function () {
      if (!ticking) {
        requestAnimationFrame(function () {
          nav.classList.toggle('scrolled', window.scrollY > 8);
          ticking = false;
        });
        ticking = true;
      }
    }, { passive: true });
  })();

  // Hamburger / mobile menu
  (function () {
    var btn = document.getElementById('hamburger');
    var menu = document.getElementById('mobileMenu');
    btn.addEventListener('click', function () {
      var open = menu.classList.toggle('open');
      btn.classList.toggle('open', open);
      btn.setAttribute('aria-expanded', String(open));
    });
    menu.querySelectorAll('a').forEach(function (link) {
      link.addEventListener('click', function () {
        menu.classList.remove('open');
        btn.classList.remove('open');
        btn.setAttribute('aria-expanded', 'false');
      });
    });
  })();
</script>
