<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <!-- Favicon -->
  <link rel="icon" type="image/x-icon" href="/favicon.ico">
  <link rel="icon" type="image/svg+xml" href="/favicon.svg">
  <link rel="icon" type="image/png" sizes="32x32" href="/favicon-32.png">
  <link rel="apple-touch-icon" href="/favicon.png">

  <title>{{ .Title }} | {{ .Site.Data.siteconfig.company.name }}</title>
  <meta name="description" content="{{ .Description | default .Site.Data.siteconfig.company.description }}">
  <meta name="keywords" content="{{ delimit .Keywords ", " | default "tax consulting, CPA, tax strategy" }}">

  <!-- Open Graph / Social (Facebook, Reddit) -->
  <meta property="og:type" content="website">
  <meta property="og:url" content="{{ .Permalink }}">
  <meta property="og:site_name" content="{{ .Site.Data.siteconfig.company.name }}">
  <meta property="og:title" content="{{ .Title }} | {{ .Site.Data.siteconfig.company.name }}">
  <meta property="og:description" content="{{ .Description | default .Site.Data.siteconfig.company.description }}">
  <meta property="og:image" content="{{ "images/social-card.png" | absURL }}">
  <meta property="og:image:width" content="1200">
  <meta property="og:image:height" content="630">
  <meta property="og:locale" content="{{ .Site.Data.siteconfig.metadata.locale }}">

  <!-- Twitter / X Cards -->
  <meta name="twitter:card" content="summary_large_image">
  <meta name="twitter:title" content="{{ .Title }} | {{ .Site.Data.siteconfig.company.name }}">
  <meta name="twitter:description" content="{{ .Description | default .Site.Data.siteconfig.company.description }}">
  <meta name="twitter:image" content="{{ "images/social-card.png" | absURL }}">

  <!-- Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Playfair+Display:wght@700&display=swap" rel="stylesheet">

  <!-- Styles -->
  <link rel="stylesheet" href="/css/style.css">

  <!-- JSON-LD Structured Data -->
  <script type="application/ld+json">
  {
    "@context": "https://schema.org",
    "@type": "AccountingService",
    "name": "{{ .Site.Data.siteconfig.company.name }}",
    "description": "{{ .Site.Data.siteconfig.company.description }}",
    "url": "{{ .Site.BaseURL }}",
    "telephone": "{{ .Site.Data.siteconfig.company.phone }}",
    "email": "{{ .Site.Data.siteconfig.company.email }}",
    "areaServed": ["Cape Coral, FL", "South Florida", "United States"],
    "openingHours": "Mo-Fr 09:00-17:00",
    "sameAs": [
      "{{ .Site.Data.siteconfig.social.facebook }}"
    ],
    "priceRange": "$$",
    "serviceType": [
      "Tax Strategy",
      "Tax Compliance",
      "International Tax",
      "Bookkeeping",
      "Payroll",
      "Sales Tax"
    ]
  }
  </script>

  <!-- BreadcrumbList Structured Data -->
  {{ if not .IsHome }}
  <script type="application/ld+json">
  {
    "@context": "https://schema.org",
    "@type": "BreadcrumbList",
    "itemListElement": [
      {
        "@type": "ListItem",
        "position": 1,
        "name": "Home",
        "item": "{{ .Site.BaseURL }}"
      }{{ if .Parent }},
      {
        "@type": "ListItem",
        "position": 2,
        "name": "{{ .Parent.Title }}",
        "item": "{{ .Parent.Permalink }}"
      },
      {
        "@type": "ListItem",
        "position": 3,
        "name": "{{ .Title }}",
        "item": "{{ .Permalink }}"
      }{{ else }},
      {
        "@type": "ListItem",
        "position": 2,
        "name": "{{ .Title }}",
        "item": "{{ .Permalink }}"
      }{{ end }}
    ]
  }
  </script>
  {{ end }}

  <!-- Google Analytics -->
  {{ if .Site.Data.siteconfig.integrations.analytics.ga4Id }}
  <script async src="https://www.googletagmanager.com/gtag/js?id={{ .Site.Data.siteconfig.integrations.analytics.ga4Id }}"></script>
  <script>
    window.dataLayer = window.dataLayer || [];
    function gtag(){dataLayer.push(arguments);}
    gtag('js', new Date());
    gtag('config', '{{ .Site.Data.siteconfig.integrations.analytics.ga4Id }}');
  </script>
  {{ end }}
