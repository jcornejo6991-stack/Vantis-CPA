  <!-- Favicon -->

  <link rel="icon" type="image/svg+xml" href="/favicon.svg">
  <link rel="icon" type="image/png" sizes="32x32" href="/favicon-32.png">

  <title>{{ if .IsHome }}{{ .Title }}{{ else }}{{ .Title }} | {{ .Site.Data.siteconfig.company.name }}{{ end }}</title>
  <link rel="canonical" href="{{ .Permalink }}">
  <meta name="description" content="{{ .Description | default .Site.Data.siteconfig.company.description }}">
  <meta name="keywords" content="{{ delimit .Keywords ", " | default "tax consulting, CPA, tax strategy" }}">

  <meta property="og:image:height" content="630">
  <meta property="og:locale" content="{{ .Site.Data.siteconfig.metadata.locale }}">

  <!-- BreadcrumbList Structured Data -->
  {{ if not .IsHome }}
  <script type="application/ld+json">
  {
    "@context": "https://schema.org",
    "@type": "BreadcrumbList",
    "itemListElement": [
      {
        "@type": "ListItem",
        "position": 1,
        "name": "Home",
        "item": "{{ .Site.BaseURL }}"
      }{{ if and .Parent (not .Parent.IsHome) }},
      {
        "@type": "ListItem",
        "position": 2,
        "name": "{{ .Parent.Title }}",
        "item": "{{ .Parent.Permalink }}"
      },
      {
        "@type": "ListItem",
        "position": 3,
        "name": "{{ .Title }}",
        "item": "{{ .Permalink }}"
      }{{ else }},
      {
        "@type": "ListItem",
        "position": 2,
        "name": "{{ .Title }}",
        "item": "{{ .Permalink }}"
      }{{ end }}
    ]
  }
  </script>
  {{ end }}
