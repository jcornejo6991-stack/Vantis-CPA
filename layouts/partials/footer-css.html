<!-- Footer CSS -->
<style>
    .footer { background: #080808; padding: 64px 0 32px; margin: 0; border-radius: 0; box-shadow: none; border-top: 1px solid rgba(255,255,255,0.06); width: 100%; position: relative; z-index: 1; }
    .footer-grid {
      display: grid;
      grid-template-columns: 4.5fr 0.9fr 0.9fr 1.8fr;
      gap: 60px;
      margin-bottom: 0;
    }
    .footer-brand-mark {
      width: 40px; height: 40px;
      background: rgba(255,255,255,0.1);
      border-radius: 9px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: 'Playfair Display', serif;
      font-size: 16px;
      font-weight: 700;
      color: #fff;
      margin-bottom: 14px;
    }
    .footer-firm-name { font-size: 15px; font-weight: 600; color: #fff; margin-bottom: 4px; }
    .footer-tagline { font-family: 'Playfair Display', serif; font-style: italic; font-size: 14px; color: #b0b8c8; margin-bottom: 14px; }
    .footer-license { font-size: 12px; color: #6b7280; margin-bottom: 16px; }
    .footer-contact a { display: block; font-size: 14px; color: #9CDCFE; text-decoration: none; margin-bottom: 6px; }
    .footer-contact a:hover { color: #fff; }
    .footer-about { font-size: 13px; color: #b0b8c8; line-height: 1.6; margin-top: 16px; max-width: 380px; }
    .footer-about strong { color: #fff; }
    .footer-col-title { font-size: 11px; font-weight: 600; letter-spacing: 0.1em; text-transform: uppercase; color: #569CD6; margin-bottom: 16px; }
    .footer-links { list-style: none; display: flex; flex-direction: column; gap: 8px; margin-right: 16px; }
    .footer-links li { display: flex; align-items: center; white-space: nowrap; }
    .footer-links a { font-size: 14px; color: #b0b8c8; text-decoration: none; transition: color 0.2s; white-space: nowrap; }
    .footer-links a:hover { color: #9CDCFE; }
    .footer-col-gap { margin-top: 28px; }
    .footer-bottom { display: flex; justify-content: space-between; align-items: center; margin-top: 32px; padding-top: 16px; border-top: 1px solid rgba(255,255,255,0.08); }
    .footer-copy { font-size: 12px; color: #6b7280; }
    .footer-legal a { font-size: 12px; color: #6b7280; text-decoration: none; }
    .footer-legal a:hover { color: #9CDCFE; }

    /* Footer responsive */
    @media (max-width: 1024px) {
      .footer-grid { grid-template-columns: 1fr 1fr; gap: 150px; }
    }
    @media (max-width: 768px) {
      .footer-grid { grid-template-columns: 1fr; gap: 150px; }
      .footer-bottom { flex-direction: column; align-items: flex-start; }
    }
</style>
