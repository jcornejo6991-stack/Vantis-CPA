<style>
    :root {
      --primary-dark: #1a1a2e;
      --primary: #569CD6;
      --primary-darkest: #0d1117;
      --accent: #4EC9B0;
      --bg: #f8f7ff;
      --bg-alt: #edeef7;
      --text-dark: #1a1a2e;
      --text-mid: #4a5568;
      --navy: #1a1a2e;
      --navy-dark: #0d1117;
      --card-radius: 8px;
      --nav-height: 68px;
    }

    *, *::before, *::after {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Inter', sans-serif;
      color: var(--text-dark);
      background-color: #ffffff;
      line-height: 1.6;
      padding-top: var(--nav-height);
      overflow-x: hidden;
      -webkit-font-smoothing: antialiased;
    }

    a {
      color: var(--primary);
      text-decoration: none;
    }

    a:hover {
      color: var(--accent);
      text-decoration: underline;
    }

    /* Hero Section */
    .hero {
      background: linear-gradient(135deg, #f8f7ff 0%, #edeef7 60%, #e8e6f5 100%);
      padding: 80px 48px;
      text-align: center;
      position: relative;
      z-index: 1;
      margin: 0;
      border-radius: 0;
      box-shadow: none;
      overflow: hidden;
    }

    .hero h1 {
      font-family: 'Playfair Display', serif;
      font-size: clamp(36px, 6vw, 64px);
      font-weight: 700;
      color: #1a1a2e;
      margin: 0;
      line-height: 1.15;
      letter-spacing: -0.5px;
    }

    .hero-subtitle {
      font-size: 17px;
      color: var(--text-mid);
      margin-top: 16px;
      font-weight: 400;
      line-height: 1.6;
    }

    .hero-breadcrumb {
      display: inline-flex;
      flex-wrap: wrap;
      justify-content: center;
      gap: 8px;
      font-size: 13px;
      color: #567565;
      margin-bottom: 14px;
    }

    .hero-breadcrumb a {
      color: var(--primary);
      text-decoration: underline;
      text-underline-offset: 2px;
    }

    .hero-breadcrumb a:hover {
      color: var(--accent);
    }

    .hero-kicker {
      font-size: 11px;
      font-weight: 700;
      letter-spacing: 1.4px;
      text-transform: uppercase;
      color: #567565;
      margin-bottom: 12px;
    }

    .hero-subpage {
      padding-top: 64px;
    }

    .hero-subpage h1 {
      font-size: clamp(32px, 5vw, 54px);
      max-width: 22ch;
      margin: 0 auto;
    }

    .hero-subpage .hero-subtitle {
      max-width: 760px;
      margin-left: auto;
      margin-right: auto;
    }

    .hero-subpage-nav {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 12px;
      margin-top: 24px;
    }

    .hero-subpage-label {
      font-size: 11px;
      font-weight: 700;
      letter-spacing: 1.2px;
      text-transform: uppercase;
      color: #567565;
    }

    .hero-subpage-links {
      display: flex;
      flex-wrap: wrap;
      justify-content: center;
      gap: 10px;
      max-width: 900px;
    }

    .hero-subpage-link {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      min-height: 42px;
      padding: 10px 16px;
      border-radius: 999px;
      border: 1px solid #c8dfd0;
      background: rgba(255, 255, 255, 0.9);
      color: var(--primary);
      font-size: 12px;
      font-weight: 600;
      text-decoration: none;
      transition: background 0.15s, border-color 0.15s, color 0.15s;
    }

    .hero-subpage-link:hover {
      background: #edf5f0;
      border-color: var(--accent);
      color: var(--primary);
      text-decoration: none;
    }

    .hero-subpage-link.is-active {
      background: var(--primary);
      border-color: var(--primary);
      color: #fff;
    }

    .hero-geo {
      font-size: 0.85rem;
      color: var(--text-mid);
      font-style: italic;
      margin-top: 16px;
      letter-spacing: 0.01em;
    }

    /* Main Content Container */
    .main-container {
      display: grid;
      grid-template-columns: 30% 70%;
      gap: 0;
      align-items: stretch;
      min-height: calc(100vh - var(--nav-height) - 300px);
      position: relative;
      z-index: 1;
      margin: 0;
      border-radius: 0;
      box-shadow: none;
    }

    .left-column {
      display: flex;
      flex-direction: column;
      background-image: repeating-linear-gradient(0deg, transparent, transparent 2px, rgba(255, 255, 255, 0.01) 2px, rgba(255, 255, 255, 0.01) 4px),
                        repeating-linear-gradient(90deg, transparent, transparent 2px, rgba(255, 255, 255, 0.01) 2px, rgba(255, 255, 255, 0.01) 4px);
      background-color: #1a1a2e;
      border-radius: 0;
    }

    .right-column {
      display: flex;
      flex-direction: column;
      padding: 80px 40px 80px 60px;
      background: #ffffff;
      border-radius: 0;
    }

    /* Contact Form - flush sidebar */
    .contact-form {
      background-color: #1a1a2e;
      border: none;
      padding: 48px 40px;
      border-radius: 20px 0 0 20px;
      box-shadow: none;
      position: sticky;
      top: var(--nav-height);
      display: flex;
      flex-direction: column;
      gap: 24px;
    }

    .contact-form h3 {
      font-family: 'Playfair Display', serif;
      font-size: 34px;
      font-weight: 600;
      color: #fff;
      margin-bottom: 0;
      letter-spacing: -0.5px;
    }

    .form-privacy {
      font-size: 12px;
      color: rgba(255, 255, 255, 0.5);
      margin: 0;
      font-style: italic;
    }

    .form-cta {
      font-size: 13px;
      color: rgba(255, 255, 255, 0.7);
      margin-bottom: 24px;
      font-weight: 500;
      display: none;
    }

    .form-inputs-wrapper {
      display: flex;
      flex-direction: column;
      gap: 20px;
    }

    .form-buttons-wrapper {
      display: flex;
      flex-direction: column;
      gap: 10px;
      padding-top: 24px;
      border-top: 1px solid rgba(255, 255, 255, 0.15);
    }

    .calendar-label {
      font-size: 17px;
      font-weight: 700;
      color: #fff;
      letter-spacing: 0.3px;
      margin: 0;
    }

    .calendar-sublabel {
      font-size: 13px;
      color: rgba(255, 255, 255, 0.6);
      margin: 0;
    }

    .form-group {
      margin-bottom: 20px;
      display: flex;
      flex-direction: column;
    }

    .form-group label {
      font-size: 13px;
      font-weight: 700;
      margin-bottom: 8px;
      color: #fff;
      letter-spacing: 0.3px;
    }

    .form-group input,
    .form-group textarea {
      padding: 12px 14px;
      border: 1.5px solid rgba(255, 255, 255, 0.2);
      background: rgba(255, 255, 255, 0.1);
      border-radius: 8px;
      font-family: 'Inter', sans-serif;
      font-size: 14px;
      color: #fff;
      transition: border-color 0.2s, box-shadow 0.2s, background 0.2s;
    }

    .form-group input::placeholder,
    .form-group textarea::placeholder {
      color: rgba(255, 255, 255, 0.5);
    }

    .form-group input:focus,
    .form-group textarea:focus {
      outline: none;
      border-color: rgba(255, 255, 255, 0.4);
      background: rgba(255, 255, 255, 0.15);
      box-shadow: 0 0 0 4px rgba(255, 255, 255, 0.1);
    }

    .form-group textarea {
      min-height: 120px;
      resize: vertical;
      font-size: 13px;
    }

    .form-submit {
      padding: 14px 32px;
      background: #569CD6;
      color: #fff;
      border: none;
      border-radius: 8px;
      font-family: 'Inter', sans-serif;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.3s;
      width: 100%;
      margin-top: 8px;
    }

    .form-submit:hover {
      background: #4a88be;
      transform: translateY(-2px);
    }

    /* Trust Bar — inside hero card, flush to bottom edge */
    .trust-bar {
      display: flex;
      margin: 32px -48px -80px;
      border-top: 1px solid rgba(0,0,0,0.07);
      background: rgba(255,255,255,0.5);
    }
    .trust-bar-cell {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 16px 18px 14px;
      border-right: 1px solid #ececec;
      flex: 1;
      gap: 4px;
      text-align: center;
    }
    .trust-bar-cell:last-child { border-right: none; }
    .trust-bar-icon {
      width: 32px;
      height: 32px;
      border-radius: 8px;
      background: #eaf4ee;
      display: flex;
      align-items: center;
      justify-content: center;
      margin-bottom: 5px;
      flex-shrink: 0;
    }
    .trust-bar-title {
      font-size: 12px;
      font-weight: 700;
      color: #0f2818;
      line-height: 1.25;
    }
    .trust-bar-sub {
      font-size: 10.5px;
      color: #8a9b8e;
      line-height: 1.3;
    }

    @media (max-width: 600px) {
      .trust-bar {
        flex-wrap: wrap;
        margin: 24px -20px -48px;
      }
      .trust-bar-cell {
        flex: 1 1 50%;
        border-right: none;
        border-bottom: 1px solid rgba(0,0,0,0.07);
        padding: 14px 12px 12px;
      }
      .trust-bar-cell:nth-child(odd) { border-right: 1px solid rgba(0,0,0,0.07); }
      .trust-bar-cell:nth-child(3),
      .trust-bar-cell:nth-child(4) { border-bottom: none; }
    }

    /* Contact Info Block */
    .contact-info {
      display: flex;
      flex-direction: column;
      gap: 16px;
      font-size: 15px;
    }

    .contact-info-item {
      margin: 0;
      color: rgba(255, 255, 255, 0.7);
      font-size: 14px;
      line-height: 1.6;
    }

    .contact-info-item strong {
      display: block;
      color: #fff;
      margin-bottom: 6px;
      font-size: 13px;
      font-weight: 700;
      letter-spacing: 0.05em;
      text-transform: uppercase;
    }

    .contact-info-item a {
      color: #fff;
      font-weight: 600;
      text-decoration: none;
      transition: opacity 0.2s;
    }

    .contact-info-item a:hover {
      opacity: 0.8;
      text-decoration: underline;
    }

    /* CTA Buttons on right side */
    .form-button {
      padding: 12px 20px;
      border: 1.5px solid rgba(255, 255, 255, 0.3);
      background: transparent;
      color: #fff;
      border-radius: 8px;
      font-family: 'Inter', sans-serif;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      text-decoration: none;
      display: inline-block;
      text-align: center;
      transition: all 0.2s;
    }

    .form-button:hover {
      border-color: #fff;
      background: rgba(255, 255, 255, 0.1);
    }

    .form-button.primary {
      background: #569CD6;
      border-color: #569CD6;
    }

    .form-button.primary:hover {
      background: #4a88be;
      border-color: #4a88be;
    }

    /* Main Content */
    .intro-text {
      font-size: 18px;
      color: var(--text-mid);
      line-height: 1.8;
      margin-bottom: 40px;
      padding-bottom: 32px;
      border-bottom: 2px solid #f0f0f0;
    }
    .intro-text-sections {
      display: grid;
      gap: 0;
      padding-bottom: 0;
      border-bottom: none;
    }
    .intro-text p + p {
      margin-top: 20px;
    }

    .intro-text strong {
      color: var(--text-dark);
      font-weight: 600;
    }

    .intro-section {
      margin-bottom: 28px;
    }
    .intro-text-sections .intro-section {
      margin-bottom: 0;
      padding: 0 0 30px;
      border-bottom: 1px solid rgba(21, 72, 46, 0.12);
      background: transparent;
      box-shadow: none;
    }
    .intro-text-sections .intro-section + .intro-section {
      padding-top: 30px;
    }
    .intro-text-sections .intro-section:last-child {
      padding-bottom: 0;
      border-bottom: none;
    }

    .intro-heading {
      font-family: 'Playfair Display', serif;
      font-size: 17px;
      font-weight: 700;
      color: var(--navy);
      margin-bottom: 18px !important;
      margin-top: 0 !important;
    }
    .intro-text-sections .intro-heading {
      font-size: 20px;
      margin-bottom: 20px !important;
    }

    .intro-section p {
      margin-top: 10px;
    }
    .intro-section > *:last-child {
      margin-bottom: 0 !important;
    }
    .intro-section h2,
    .intro-section h3,
    .body-module h2,
    .body-module h3 {
      font-family: 'Playfair Display', serif;
      color: var(--text-dark);
      line-height: 1.3;
    }
    .intro-section h2,
    .body-module h2 {
      font-size: 24px;
      margin: 28px 0 12px;
    }
    .intro-section h3,
    .body-module h3 {
      font-size: 19px;
      margin: 24px 0 10px;
    }

    .intro-text ul {
      list-style: none;
      padding-left: 0;
      margin: 8px 0;
    }

    .intro-text ul li {
      position: relative;
      padding-left: 22px;
      margin-bottom: 5px;
      font-size: 17px;
      line-height: 1.7;
      color: var(--text-mid);
    }

    .intro-text ul li::before {
      content: "*";
      position: absolute;
      left: 0;
      color: var(--accent);
      font-weight: 700;
      font-size: 15px;
    }

    .intro-section table,
    .body-module table {
      width: 100%;
      margin: 22px 0;
      border-collapse: separate;
      border-spacing: 0;
      background: #fff;
      border: 1px solid rgba(21, 72, 46, 0.08);
      border-radius: 16px;
      overflow: hidden;
      box-shadow: 0 10px 24px rgba(15, 40, 24, 0.08);
      font-size: 14px;
    }
    .intro-section th,
    .body-module th {
      padding: 11px 14px;
      background: #15482E;
      color: #fff;
      text-align: left;
      font-weight: 600;
    }
    .intro-section td,
    .body-module td {
      padding: 10px 14px;
      border-bottom: 1px solid #e6ebe8;
      color: var(--text-mid);
      vertical-align: top;
    }
    .intro-section tr:last-child td,
    .body-module tr:last-child td {
      border-bottom: none;
    }
    .intro-section tr:nth-child(even) td,
    .body-module tr:nth-child(even) td {
      background: #f8fbf9;
    }

    .article-callout {
      margin: 28px 0;
      padding: 20px 22px;
      border-radius: 16px;
      border: 1px solid rgba(21, 72, 46, 0.12);
      background: #fff;
      box-shadow: 0 12px 28px rgba(15, 40, 24, 0.06);
    }
    .article-callout[data-tone="warning"] {
      background: #fffdf7;
      border-color: rgba(181, 128, 0, 0.18);
    }
    .article-callout[data-tone="opportunity"] {
      background: #f8fbf8;
      border-color: rgba(21, 72, 46, 0.16);
    }
    .article-callout[data-tone="comparison"] {
      background: linear-gradient(135deg, rgba(246, 250, 247, 0.96) 0%, rgba(236, 245, 239, 0.96) 100%);
    }
    .article-callout-title {
      display: block;
      font-size: 13px;
      font-weight: 700;
      letter-spacing: 0.3px;
      color: var(--text-dark);
      margin-bottom: 8px;
    }
    .article-callout p:last-child,
    .article-callout ul:last-child,
    .article-callout ol:last-child {
      margin-bottom: 0;
    }

    .article-pullquote {
      margin: 32px 0;
      padding: 8px 0 8px 24px;
      border-left: 4px solid #15482E;
    }
    .article-pullquote blockquote {
      margin: 0;
    }
    .article-pullquote p {
      margin: 0;
      font-family: 'Playfair Display', serif;
      font-size: clamp(24px, 3vw, 32px);
      line-height: 1.35;
      color: var(--text-dark);
      letter-spacing: -0.02em;
    }
    .article-pullquote cite {
      display: block;
      margin-top: 12px;
      font-style: normal;
      font-size: 12px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 1.1px;
      color: #5f7868;
    }

    /* Content Sections */
    .content-section {
      margin-bottom: 48px;
    }

    .section-title {
      font-family: 'Playfair Display', serif;
      font-size: 20px;
      font-weight: 600;
      color: var(--navy);
      margin-bottom: 24px;
      position: relative;
      padding-bottom: 12px;
    }

    .section-title:after {
      content: '';
      position: absolute;
      bottom: 0;
      left: 0;
      width: 40px;
      height: 3px;
      background: linear-gradient(90deg, var(--accent), transparent);
    }

    .section-list {
      list-style: none;
      padding-left: 0;
      display: grid;
      grid-template-columns: repeat(3, minmax(0, 1fr));
      gap: 8px 10px;
    }

    .section-list li {
      margin-bottom: 0;
      padding: 10px 12px;
      position: relative;
      font-size: 13px;
      line-height: 1.4;
      color: var(--text-mid);
      border: 1px solid #e1e8e3;
      border-radius: 10px;
      background: #fbfcfb;
    }

    .section-list li:before {
      content: none;
    }

    .section-list a {
      color: var(--primary);
      font-weight: 500;
      transition: color 0.2s;
    }

    .section-list a:hover {
      color: var(--accent);
      text-decoration: underline;
    }

    .spec-group-title {
      font-family: 'Playfair Display', serif;
      font-size: 15px;
      font-weight: 600;
      color: var(--navy);
      margin-top: 28px;
      margin-bottom: 12px;
      padding-bottom: 6px;
      border-bottom: 1px solid #d0ddd4;
    }
    .spec-group-title:first-of-type {
      margin-top: 4px;
    }

    .grain-overlay {
      position: relative;
    }

    .container {
      max-width: 1600px;
      margin: 0 auto;
      padding: 0 18px;
    }

    /* Nav handled by nav-css partial */

    @media (max-width: 1024px) {
      .main-container {
        grid-template-columns: 1fr;
        min-height: unset;
      }

      .left-column {
        order: 2;
      }

      .right-column {
        order: 1;
        padding: 40px 24px 60px;
      }

      .contact-form {
        gap: 20px;
        padding: 40px 24px;
      }

    }

    @media (max-width: 768px) {
      .hero {
        padding: 48px 20px;
        margin: 0;
        border-radius: 0;
      }

      .main-container {
        margin: 0;
        border-radius: 0;
      }

      .hero h1 {
        font-size: 32px;
      }

      .hero-subpage {
        padding-top: 44px;
      }

      .hero-subpage-links {
        width: 100%;
      }

      .main-container {
        grid-template-columns: 1fr;
        min-height: unset;
        width: 100%;
      }

      .right-column {
        padding: 40px 20px 60px;
        width: 100%;
        max-width: 100%;
      }

      .intro-text-sections {
        gap: 0;
      }

      .intro-text-sections .intro-section {
        padding-bottom: 24px;
      }

      .intro-text-sections .intro-section + .intro-section {
        padding-top: 24px;
      }

      .contact-form {
        gap: 20px;
        padding: 32px 20px;
        width: 100%;
      }

      .form-buttons-wrapper {
        flex-direction: column;
        gap: 12px;
        margin-top: 0;
      }

      .section-list {
        margin-bottom: 24px;
        grid-template-columns: repeat(2, minmax(0, 1fr));
      }
    }

    @media (max-width: 480px) {
      .hero {
        padding: 48px 15px;
        margin: 0;
        border-radius: 0;
      }

      .main-container {
        margin: 0;
        border-radius: 0;
      }

      .hero h1 {
        font-size: 24px;
      }

      .hero-breadcrumb {
        gap: 6px;
        font-size: 12px;
      }

      .hero-subpage-link {
        width: 100%;
      }

      .contact-form {
        padding: 28px 16px;
        gap: 16px;
      }

      .contact-form h3 {
        font-size: 20px;
        margin-bottom: 16px;
      }

      .form-group input,
      .form-group textarea {
        font-size: 16px;
      }

      .form-submit {
        width: 100%;
        align-self: stretch;
      }

      .form-buttons-wrapper {
        flex-direction: column;
      }

      .form-button {
        width: 100%;
      }

      .right-column {
        padding: 32px 16px 48px;
      }

      .intro-text-sections .intro-section {
        padding-bottom: 20px;
      }

      .intro-text-sections .intro-section + .intro-section {
        padding-top: 20px;
      }

      .section-title {
        font-size: 16px;
      }

      .section-list li {
        font-size: 13px;
      }

      .section-list {
        grid-template-columns: 1fr;
      }
    }

    /* ── Related Reading ── */
    .cross-link-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 8px;
    }
    .cross-link-grid-stack {
      margin-top: 22px;
      grid-template-columns: 1fr;
    }

    .cross-link-card {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 10px 14px;
      border-radius: 10px;
      background: #f7fbf8;
      border: 1px solid #c8dfd0;
      font-size: 13px;
      font-weight: 500;
      color: #062215;
      text-decoration: none;
      transition: background 0.15s, border-color 0.15s;
    }

    .cross-link-card:hover {
      background: #e8f0eb;
      border-color: var(--accent);
      text-decoration: none;
      color: #062215;
    }

    .cross-link-arrow {
      color: var(--accent);
      font-size: 12px;
      flex-shrink: 0;
      margin-left: 8px;
    }

    @media (max-width: 600px) {
      .cross-link-grid {
        grid-template-columns: 1fr;
      }
    }
  </style>
