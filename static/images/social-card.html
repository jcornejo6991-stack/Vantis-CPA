<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=1200">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body { width: 1200px; height: 630px; overflow: hidden; }
  body {
    background: #0e2b1d;
    display: flex;
    align-items: center;
    padding: 0 132px;
    font-family: Georgia, 'Times New Roman', serif;
  }
  .inner {
    display: flex;
    flex-direction: column;
    justify-content: center;
  }
  .accent {
    width: 32px;
    height: 2px;
    background: #4caf82;
    margin-bottom: 28px;
  }
  .wordmark {
    font-size: 72px;
    font-weight: 700;
    color: #f5f0e8;
    letter-spacing: -1px;
    line-height: 1.05;
    margin-bottom: 20px;
  }
  .domain {
    font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif;
    font-size: 15px;
    color: #6aad8a;
    letter-spacing: 0.08em;
    font-weight: 400;
  }
</style>
</head>
<body>
  <div class="inner">
    <div class="accent"></div>
    <div class="wordmark">Vantis CPA</div>
    <div class="domain">vantiscpa.com</div>
  </div>
</body>
</html>
